<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STAR AI | محمد شوكت</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --accent: #007aff;
            --accent-grad: linear-gradient(135deg, #007aff, #5856d6);
            --glass: rgba(20, 20, 22, 0.8);
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --border: #222;
        }

        /* Animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; color: #ff3b30; } 100% { transform: scale(1); opacity: 0.8; } }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); margin: 0; 
            display: flex; height: 100vh; overflow: hidden;
            animation: fadeIn 0.8s ease-in-out;
        }

        /* Sidebar */
        .sidebar {
            width: 300px; background: var(--sidebar-bg); padding: 20px;
            display: flex; flex-direction: column; border-left: 1px solid var(--border);
            position: fixed; right: 0; top: 0; bottom: 0; z-index: 1001;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sidebar.closed { transform: translateX(100%); }

        .btn-new {
            background: var(--accent-grad); color: white; padding: 14px;
            border-radius: 12px; text-align: center; cursor: pointer;
            font-weight: 600; margin-bottom: 20px; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.2);
        }
        .btn-new:active { transform: scale(0.95); }

        .history-box { flex: 1; overflow-y: auto; }
        .history-item {
            padding: 12px; border-radius: 10px; background: #111; margin-bottom: 8px;
            border: 1px solid var(--border); display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; font-size: 13px; transition: all 0.3s ease;
        }
        .history-item:hover { border-color: var(--accent); background: #161618; transform: translateX(-5px); }
        .del-btn { color: #ff3b30; font-size: 18px; padding: 0 5px; opacity: 0.6; }

        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        header {
            padding: 15px 20px; background: var(--glass); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex; 
            justify-content: space-between; align-items: center; z-index: 100;
        }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px 8%; scroll-behavior: smooth; }

        .msg { display: flex; gap: 15px; margin-bottom: 30px; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .avatar { width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .ai-avatar { background: var(--accent-grad); box-shadow: 0 0 15px rgba(0, 122, 255, 0.3); }
        .user-avatar { background: #333; }

        .verified-badge {
            display: inline-flex !important; align-items: center; gap: 8px;
            background: rgba(0, 122, 255, 0.1); color: var(--accent);
            padding: 6px 12px; border-radius: 10px; font-size: 11px;
            font-weight: bold; margin-bottom: 10px; border: 1px solid rgba(0, 122, 255, 0.2);
            animation: fadeIn 0.5s ease;
        }

        .content { flex: 1; min-width: 0; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .content b { display: block; color: var(--accent); font-size: 11px; margin-bottom: 5px; }

        .code-wrap {
            margin: 20px 0; background: #000 !important; border-radius: 12px;
            border: 1px solid var(--border); overflow: hidden; direction: ltr !important;
            max-width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .code-top {
            display: flex; justify-content: space-between; padding: 10px 15px;
            background: #1a1a1b; font-size: 11px; color: #aaa; border-bottom: 1px solid var(--border);
        }
        .copy-btn { color: var(--accent); cursor: pointer; font-weight: bold; }
        pre { margin: 0; padding: 18px; overflow-x: auto; white-space: pre; }
        code { font-family: "SF Mono", Consolas, monospace; color: #7dd3fc; font-size: 13.5px; }

        .input-area { padding: 20px; background: var(--bg); border-top: 1px solid var(--border); }
        .input-box {
            max-width: 800px; margin: 0 auto; background: var(--glass);
            border-radius: 20px; display: flex; padding: 5px 15px;
            border: 1px solid var(--border); align-items: center; transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 122, 255, 0.2); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 15px; outline: none; }
        
        .mic-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-dim); padding: 0 10px; transition: 0.3s; }
        .mic-btn.recording { color: #ff3b30; animation: pulse 1s infinite; }

        .send-btn { background: var(--accent); color: white; width: 35px; height: 35px; border-radius: 50%; border: none; cursor: pointer; transition: 0.3s; }
        .send-btn:hover { transform: scale(1.1); }

        .loader { display: none; text-align: center; color: var(--accent); font-size: 12px; margin-bottom: 10px; animation: pulse 1.5s infinite; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }
        
        .tag { background: #111; padding: 8px 16px; border-radius: 15px; font-size: 12px; border: 1px solid var(--border); cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .tag:hover { border-color: var(--accent); transform: translateY(-3px); }
                .input-area { 
            padding: 15px 20px 30px 20px; /* زودنا المسافة من تحت */
            background: var(--bg); 
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 10;
            /* دي إضافة عشان تضمن إنه ميبقاش لازق في حافة الشاشة التحتانية */
            margin-bottom: env(safe-area-inset-bottom, 10px); 
        }
                 .input-area { 
            padding: 10px 20px;
            /* رفع المنطقة بمقدار 60 بكسل عشان نعدي منطقة أزرار المتصفح والموبايل */
            padding-bottom: calc(60px + env(safe-area-inset-bottom)); 
            background: var(--bg); 
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }


        .input-box {
            max-width: 800px; 
            margin: 0 auto; 
            background: #161618; /* لون أغمق شوية عشان يبان */
            border-radius: 20px; 
            display: flex; 
            padding: 5px 15px; 
            border: 1px solid var(--border); 
            align-items: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5); /* ضل خفيف عشان يفصله عن الخلفية */
        }


    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar closed" id="sidebar">
        <div style="font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 20px; color: var(--accent);">Hamo <span style="color:var(--accent-red)">AI</span></div>
        <div class="btn-new" onclick="startChat()">+ محادثة جديدة</div>
        <div class="history-box" id="historyList"></div>
    </div>

    <div class="main">
        <header>
            <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size: 20px; cursor: pointer;">☰</button>
            <div style="font-weight: 700;">Hamo <span style="color:var(--accent)">AI</span></div>
            <div style="width: 20px;"></div>
        </header>

        <div id="chat-window"></div>

        <div class="input-area">
            <div style="display: flex; gap: 10px; margin-bottom: 12px; overflow-x: auto; padding: 5px; max-width: 800px; margin-inline: auto;">
                <div class="tag" onclick="quickTask('اكتب كود بايثون بسيط')">💻 كود بايثون</div>
                <div class="tag" onclick="quickTask('آخر أخبار الزمالك اليوم')">🏹 أخبار الزمالك</div>
                <div class="tag" onclick="quickTask('سعر الذهب اليوم في مصر')">💰 سعر الذهب</div>
            </div>
            <div id="loader" class="loader">نجم يحلل... 🤔</div>
            <div class="input-box">
                <button id="mic-btn" class="mic-btn" onclick="toggleVoice()">🎤</button>
                <input type="text" id="userInput" placeholder="اسأل نجم، ..." autocomplete="off">
                <button id="action-btn" class="send-btn" onclick="handleAction()">↑</button>
            </div>
        </div>
    </div>
<script>
    const GROQ_API = "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";
    const SERPER_API = "77c0cda151546c39dd754602c7154a2c7471ed54"; 

    let activeSession = Date.now();
    let chats = JSON.parse(localStorage.getItem('star_diamond_v4')) || [];
    let history = [];
    let isRecording = false;
    let isTyping = false; 
    let currentFrame; 
    let isSpeaking = false; 

    // إعدادات التعرف على الصوت
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'ar-EG';
    recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript;
        document.getElementById('userInput').value = transcript;
        stopVoiceUI();
        
        // هنا التعديل: بننادي sendMessage ونبعت لها true
        // عشان نجم يعرف إن ده صوت فيرد عليك بالصوت
        sendMessage(true); 
    };
    recognition.onend = () => stopVoiceUI();
    recognition.onerror = () => stopVoiceUI();

    function toggleVoice() {
        if (isRecording) { recognition.stop(); }
        else { 
            recognition.start(); 
            document.getElementById('mic-btn').classList.add('recording');
            isRecording = true;
        }
    }
    function stopVoiceUI() {
        document.getElementById('mic-btn').classList.remove('recording');
        isRecording = false;
    }

    function speak(text) {
    window.speechSynthesis.cancel();
    const clean = text.replace(/[*#🌐✅]/g, '').substring(0, 300);
    const msg = new SpeechSynthesisUtterance(clean);
    msg.lang = 'ar-EG';
    
    msg.onstart = () => {
        isSpeaking = true;
        updateBtn(isTyping); // تحديث الزرار لمربع
    };

    msg.onend = () => {
        isSpeaking = false;
        updateBtn(isTyping); // هيرجع سهم بس لو مفيش كتابة كمان
    };

    window.speechSynthesis.speak(msg);
}


    // ميزة الإيقاف
    function stopProcess() {
    isTyping = false;
    isSpeaking = false; // مهم جداً عشان يخرج من حالة الصوت
    cancelAnimationFrame(currentFrame);
    window.speechSynthesis.cancel(); // الأمر اللي بيخرسه فعلياً
    updateBtn(false); // يرجع الزرار لسهم
}



   function updateBtn(typing) {
    isTyping = typing;
    const btn = document.getElementById('action-btn');
    if (!btn) return;

    // لو فيه كتابة شغالة "أو" فيه صوت شغال، خلي الزرار مربع
    if (isTyping || isSpeaking) {
        btn.innerHTML = "■";
        btn.classList.add('stop');
        btn.style.background = "var(--accent-red)";
    } else {
        btn.innerHTML = "↑";
        btn.classList.remove('stop');
        btn.style.background = "var(--accent)";
    }
}


function handleAction() {
    // لو فيه كتابة شغالة "أو" فيه صوت شغال.. يبقى الزرار وظيفته يوقف (Stop)
    if (isTyping || isSpeaking) { 
        stopProcess();
    } else {
        // لو مفيش حاجة شغالة.. يبقى الزرار وظيفته يبعت (Send)
        sendMessage();
    }
}



    function getNow() {
        const d = new Date();
        return d.toLocaleDateString('ar-EG', {weekday:'long', day:'numeric', month:'long'}) + " - " + d.toLocaleTimeString('ar-EG');
    }

    function escape(s) { return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])); }

    const rd = new marked.Renderer();
    rd.code = (code, lang) => {
        const text = typeof code === 'object' ? code.text : code;
        return `<div class="code-wrap"><div class="code-top"><span>${(lang||'code').toUpperCase()}</span><span class="copy-btn" onclick="copy(this)">نسخ</span></div><pre><code>${escape(text)}</code></pre></div>`;
    };
    marked.setOptions({ renderer: rd, breaks: true, gfm: true });

    window.onload = () => { 
        renderHistory(); 
        startChat(); 
    };

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('closed');
        document.getElementById('overlay').classList.toggle('active');
    }

    function startChat() {
        stopProcess(); // بنوقف أي حاجة شغالة الأول
        activeSession = Date.now();
        history = [{ 
            role: "system", 
            content: `أنت "نجم"، مساعد ذكي من تطوير محمد شوكت. التاريخ: ${getNow()}.`
        }];
        document.getElementById('chat-window').innerHTML = '';
        
        // دي الحتة اللي كانت ناقصة (المقدمة والترحيب)
        append('ai', 'مرحباً بك في عالم Hamo AI! أنا نجم، مساعدك الذكي المطور بواسطة محمد شوكت. كيف يمكنني أن أجعل يومك أفضل ؟ ✨', true, false);
    }

    function append(role, text, anim = true, isLive = false) {
        const win = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = 'msg';
        let badge = isLive ? `<div class="verified-badge"><span>🌐</span> معلومة محدثة وموثقة ✅</div>` : "";

        d.innerHTML = `<div class="avatar ${role==='user'?'user-avatar':'ai-avatar'}">${role==='user'?'👤':'✨'}</div>
                       <div class="content"><b>${role==='user'?'أنت':'نجم الكون'}</b>${badge}<div class="txt"></div></div>`;
        win.appendChild(d);
        const target = d.querySelector('.txt');

        if (role === 'ai' && anim) {
            let i = 0;
            updateBtn(true);
            function type() {
                if (i < text.length && isTyping) {
                    i += 15; 
                    target.innerHTML = marked.parse(text.substring(0, i));
                    win.scrollTop = win.scrollHeight;
                    currentFrame = requestAnimationFrame(type);
                } else {
                    target.innerHTML = marked.parse(text);
                    win.scrollTop = win.scrollHeight;
                    updateBtn(false);
                }
            }
            type();
        } else {
            target.innerHTML = marked.parse(text);
            win.scrollTop = win.scrollHeight;
        }
    }

    async function sendMessage(isVoice = false) {
    const inp = document.getElementById('userInput');
    const val = inp.value.trim();
    if (!val) return;

    // بنوقف أي عملية قديمة لو موجودة
    if (isTyping) stopProcess();

    append('user', val, false, false);
    history.push({ role: "user", content: val });
    save(); 

    inp.value = '';
    const loader = document.getElementById('loader');
    loader.style.display = 'block';

    let context = "";
    let found = false;

    const needsSearch = (text) => {
        const t = text.toLowerCase();
        const must = ["سعر", "اخبار", "أخبار", "نتائج", "مباراة", "ذهب", "دولار", "موعد", "ماتش", "ترتيب"];
        return must.some(word => t.includes(word));
    };

    if (needsSearch(val)) {
        try {
            const sRes = await fetch("https://google.serper.dev/search", {
                method: "POST",
                headers: { "X-API-KEY": SERPER_API, "Content-Type": "application/json" },
                body: JSON.stringify({ q: val + " اليوم الآن", gl: "eg", hl: "ar", num: 6, tbs: "qdr:d" })
            });
            const sData = await sRes.json();
            let results = [];
            if (sData.answerBox) results.push("إجابة مباشرة: " + (sData.answerBox.answer || sData.answerBox.snippet));
            if (sData.organic) sData.organic.forEach(o => results.push(o.snippet));
            if (results.length > 0) { found = true; context = results.join('\n---\n'); }
        } catch (e) { console.log("Search Error"); }
    }

    try {
        const messagesToSend = [...history];
        if (found) {
            messagesToSend[messagesToSend.length - 1] = {
                role: "user",
                content: `التاريخ الحالي: ${getNow()}\nمعلومات جوجل:\n${context}\n\nسؤال المستخدم: ${val}\nأجب بتقرير مفصل.`
            };
        }

        const gRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${GROQ_API}`, "Content-Type": "application/json" },
            body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: messagesToSend, temperature: 0.4 })
        });

        const gData = await gRes.json();
        loader.style.display = 'none';

        if (gData && gData.choices && gData.choices[0]) {
            const reply = gData.choices[0].message.content;
            history.push({ role: "assistant", content: reply });
            save(); 
            
            // بيعرض الكلام بحركة الكتابة
            append('ai', reply, true, found); 

            // التعديل المهم: بيتكلم بصوت بس لو المدخل كان صوتي
            if (isVoice) {
                speak(reply); 
            }
        }
    } catch (e) { 
        loader.style.display = 'none';
        console.error(e);
    }
}


    function save() {
        if (history.length < 1) return;
        let title = "محادثة جديدة";
        const firstUser = history.find(m => m.role === 'user');
        if (firstUser) title = firstUser.content.substring(0, 25) + "...";
        const data = { id: activeSession, title: title, messages: [...history] };
        const idx = chats.findIndex(c => c.id === activeSession);
        if (idx > -1) chats[idx] = data; else chats.unshift(data);
        localStorage.setItem('star_diamond_v4', JSON.stringify(chats));
        renderHistory();
    }

    function renderHistory() {
        const box = document.getElementById('historyList'); box.innerHTML = '';
        chats.forEach(c => {
            const d = document.createElement('div'); d.className = 'history-item';
            d.innerHTML = `<span onclick="loadChat(${c.id})" style="flex:1">${c.title}</span><span class="del-btn" onclick="deleteChat(${c.id}, event)">×</span>`;
            box.appendChild(d);
        });
    }

    function loadChat(id) {
        stopProcess();
        const c = chats.find(x => x.id === id);
        if (c) {
            activeSession = c.id; 
            history = [...c.messages];
            document.getElementById('chat-window').innerHTML = '';
            history.forEach(m => { 
                if(m.role !== 'system') append(m.role === 'user' ? 'user' : 'ai', m.content, false, false); 
            });
            toggleMenu();
        }
    }

    function deleteChat(id, e) {
        e.stopPropagation(); chats = chats.filter(x => x.id !== id);
        localStorage.setItem('star_diamond_v4', JSON.stringify(chats)); renderHistory();
        if (activeSession === id) startChat();
    }

    function quickTask(t) { document.getElementById('userInput').value = t; handleAction(); }
    function copy(btn) { navigator.clipboard.writeText(btn.parentElement.nextElementSibling.innerText); btn.innerText = "✅"; setTimeout(() => btn.innerText = "نسخ", 2000); }
    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleAction(); });
</script>

</body>
</html>
